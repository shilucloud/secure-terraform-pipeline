version: '3'

vars:
  PROJECT_NAME: "myinfra"

tasks:

  # -------------------
  # Environment Setup
  # -------------------
  download:
    desc: "Install Nix"
    cmds:
      - echo "Installing Nix (if not installed)..."
      - sh <(curl --proto '=https' --tlsv1.2 -L https://nixos.org/nix/install) --daemon || true

  setup:
    desc: "Update backend configs with BUCKET_NAME and enter Nix shell"
    cmds:
      - echo "Checking required environment variables..."
      - test -n "$BUCKET_NAME" || (echo "❌ BUCKET_NAME is not set. Run: export BUCKET_NAME=company-your-bucket-name" && exit 1)
      - test -n "$LOCALSTACK_AUTH_TOKEN" || (echo "❌ LOCALSTACK_AUTH_TOKEN is not set." && exit 1)
      - echo "✅ Updating backend configs with bucket name..."
      - sed -i "s/^bucket *= *.*/bucket         = \"${BUCKET_NAME}\"/" infrastructure/envs/aws.backend
      - sed -i "s/^bucket *= *.*/bucket         = \"${BUCKET_NAME}\"/" infrastructure/envs/localstack.backend
      - echo "✅ Entering Nix shell..."
      - nix-shell

  # -------------------
  # LocalStack Tasks
  # -------------------
  localstack-up:
    desc: "Start LocalStack Pro for local testing"
    cmds:
      - echo "🚀 Starting LocalStack Pro..."
      - docker compose -f localstack/localstack-compose.yml up -d
      - echo "⏳ Waiting for LocalStack to be ready..."
      - until curl -s http://localhost:4566/_localstack/health | grep -q '"s3"'; do sleep 2; done
      - echo "✅ LocalStack is ready at http://localhost:4566"

  localstack-down:
    desc: "Stop LocalStack"
    cmds:
      - echo "🛑 Stopping LocalStack..."
      - docker compose -f localstack/localstack-compose.yml down
      - echo "✅ LocalStack stopped"

  # -------------------
  # TFLocal Tasks (LocalStack)
  # -------------------
  tflocal-init:
    desc: "Initialize Terraform using LocalStack backend"
    cmds:
      - echo "🔧 Creating LocalStack state bucket if it doesn't exist..."
      - aws --endpoint-url=http://localhost:4566 s3 mb s3://localstack-terraform-state || true
      - echo "🔧 Initializing Terraform with LocalStack backend..."
      - cd infrastructure && tflocal init -reconfigure -backend-config=envs/localstack.backend

  tflocal-plan:
    desc: "Plan Terraform using LocalStack"
    cmds:
      - echo "📋 Running Terraform plan against LocalStack..."
      - cd infrastructure && tflocal plan

  tflocal-apply:
    desc: "Apply Terraform using LocalStack"
    cmds:
      - echo "🧱 Applying Terraform against LocalStack..."
      - cd infrastructure && tflocal apply -auto-approve

  tflocal-destroy:
    desc: "Destroy Terraform resources in LocalStack"
    cmds:
      - echo "🗑 Destroying Terraform resources in LocalStack..."
      - cd infrastructure && tflocal destroy -auto-approve

  # -------------------
  # Security & Policy Checks
  # -------------------
  checkov:
    desc: "Run Checkov security scan against Terraform plan"
    cmds:
      - echo "🛡 Generating Terraform plan JSON for Checkov..."
      - cd infrastructure && tflocal plan -out=tfplan && tflocal show -json tfplan > tfplan.json
      - echo "🛡 Running Checkov..."
      - checkov -f infrastructure/tfplan.json --hard-fail-on=HIGH,CRITICAL -o json > checkov-report.json
      - echo "✅ Checkov report saved to checkov-report.json"

  conftest:
    desc: "Run Conftest OPA policy checks against Terraform plan"
    cmds:
      - echo "📋 Generating Terraform plan JSON for Conftest..."
      - cd infrastructure && tflocal plan -out=tfplan && tflocal show -json tfplan > tfplan.json
      - echo "📋 Running Conftest policies..."
      - conftest test infrastructure/tfplan.json --output=json
      - echo "✅ All policies passed"

  scan:
    desc: "Run all security scans (Checkov + Conftest)"
    cmds:
      - echo "🔒 Generating Terraform plan JSON..."
      - cd infrastructure && tflocal plan -out=tfplan && tflocal show -json tfplan > tfplan.json
      - echo "🛡 Running Checkov..."
      - checkov -f infrastructure/tfplan.json --hard-fail-on=HIGH,CRITICAL -o json > checkov-report.json
      - echo "📋 Running Conftest..."
      - conftest test infrastructure/tfplan.json --output=json
      - echo "✅ All security scans passed"

  # -------------------
  # Testing
  # -------------------
  test:
    desc: "Run all Terratest integration tests against LocalStack"
    cmds:
      - echo "🧪 Running Terratest..."
      - cd test && go test ./ -v -timeout 30m
      - echo "✅ All tests passed"

  test-s3:
    desc: "Run only the S3 bucket unit test"
    cmds:
      - echo "🧪 Running S3 bucket test..."
      - cd test && go test ./ -v -run TestS3Bucket -timeout 30m

  test-e2e:
    desc: "Run only the E2E test (upload and read file)"
    cmds:
      - echo "🧪 Running E2E test..."
      - cd test && go test ./ -v -run TestE2E -timeout 30m

  # -------------------
  # GitHub Actions via act
  # -------------------
  act-show:
    desc: "Show all available workflows and jobs"
    cmds:
      - echo "Listing all workflows..."
      - act --list

  act-lint:
    desc: "Run actionlint workflow locally"
    cmds:
      - act -j lint --secret-file .secrets.env

  act-deploy:
    desc: "Run CD deploy job locally"
    cmds:
      - act -j deploy_to_aws --secret-file .secrets.env

  act-terraform:
    desc: "Run full CI terraform pipeline locally"
    cmds:
      - act -j terraform_pipeline --secret-file .secrets.env

  act-dep-review:
    desc: "Run dependency-review workflow locally"
    cmds:
      - act -j dependency-review --secret-file .secrets.env

  act-dockerlint:
    desc: "Run Dockerfile lint workflow locally"
    cmds:
      - act -j dockerlint --secret-file .secrets.env

  act-drift-check:
    desc: "Run drift-check job locally"
    cmds:
      - act -j drift_check --secret-file .secrets.env

  act-auto-remediation:
    desc: "Run auto_remediation job locally"
    cmds:
      - act -j auto_remediation --secret-file .secrets.env

  # -------------------
  # Composite Tasks
  # -------------------
  dev-local:
    desc: "Prepare local development environment (setup → LocalStack → init)"
    cmds:
      - task: download
      - task: setup
      - task: localstack-up
      - task: tflocal-init
      - echo "✅ Local dev environment ready. Run 'task tflocal-apply' to deploy."

  all-local:
    desc: "Full local workflow: setup → LocalStack → deploy → scan → test"
    cmds:
      - task: download
      - task: setup
      - task: localstack-up
      - task: tflocal-init
      - task: tflocal-apply
      - task: scan
      - task: test
      - echo "🎉 Full local pipeline completed successfully!"

  ci-local:
    desc: "Simulate the full CI pipeline locally using act"
    cmds:
      - task: act-terraform
