name: Scheduled Drift Detection

on:
  schedule:
    - cron: "0 2 * * *"   # run daily at 2 AM
  workflow_dispatch:       # allows manual run as well

permissions:
  id-token: write
  contents: read
  issues: write

env:
  NIX_PATH: "nixpkgs=https://github.com/NixOS/nixpkgs/archive/nixos-25.05.tar.gz"
  TF_VAR_bucket_name: ${{ secrets.TF_VAR_BUCKET_NAME }}
  TF_VAR_aws_region: ${{ secrets.TF_VAR_AWS_REGION }}
  TF_VAR_enable_versioning: ${{ secrets.TF_VAR_ENABLE_VERSIONING }}
  TF_VAR_env: ${{ secrets.TF_VAR_ENV }}
  TF_VAR_tags: ${{ secrets.TF_VAR_TAGS }}

jobs:

  drift_check:
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.detect.outputs.drift_detected }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4                          # fixed: v5 does not exist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FULL_ACCESS }}
          aws-region: us-east-1

      - name: Setup Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            .terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/*.tf') }}-drift
          restore-keys: |
            terraform-${{ runner.os }}-drift

      - name: Terraform Init
        run: |
          nix-shell shell.nix --run '
            cd infrastructure &&
            terraform init -reconfigure -backend-config=envs/aws.backend
          '

      # Run refresh-only plan — exit code 2 means drift detected, 0 means no drift
      - name: Terraform Plan (refresh-only)
        id: detect
        run: |
          nix-shell shell.nix --run '
            cd infrastructure &&
            terraform plan --refresh-only -detailed-exitcode -out=tfplan | tee drift-report.txt
          ' && echo "drift_detected=false" >> $GITHUB_OUTPUT \
            || {
              code=$?
              if [ $code -eq 2 ]; then
                echo "drift_detected=true" >> $GITHUB_OUTPUT
              else
                echo "drift_detected=false" >> $GITHUB_OUTPUT
                exit $code
              fi
            }

      - name: Terraform Plan JSON
        if: steps.detect.outputs.drift_detected == 'true'
        run: |
          nix-shell shell.nix --run '
            cd infrastructure &&
            terraform show -json tfplan > tfplan.json
          '

      - name: Upload Drift Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: |
            infrastructure/drift-report.txt
            infrastructure/tfplan.json

      - name: Create GitHub Issue on Drift Detected
        if: steps.detect.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Terraform Drift Detected — ${new Date().toISOString().slice(0,10)}`,
              body: `## Terraform Drift Detected\n\n` +
                    `Real AWS infrastructure has drifted from the Terraform state.\n\n` +
                    `**Workflow Run:** [View Run](${runUrl})\n\n` +
                    `**Artifacts:** Check the drift-report artifact for the full plan output and JSON.\n\n` +
                    `**Next Steps:**\n` +
                    `- Review the drift report artifact\n` +
                    `- Approve the auto-remediation job to recreate drifted resources\n` +
                    `- Or manually investigate and fix the drift\n\n` +
                    `> This issue was automatically created by the Scheduled Drift Detection workflow.`,
              labels: ['drift', 'infrastructure', 'automated']
            });

      - name: Fail if Drift Detected
        if: steps.detect.outputs.drift_detected == 'true'
        run: |
          echo "Drift detected between Terraform state and real AWS infrastructure."
          echo "Review the drift-report artifact and approve remediation."
          exit 1

  auto_remediation:
    runs-on: ubuntu-latest
    needs: drift_check
    # always() is required because drift_check intentionally fails with exit 1
    # when drift is detected. Without always(), GitHub Actions skips dependent
    # jobs when the upstream job fails — even when that failure is intentional.
    if: always() && needs.drift_check.outputs.drift_detected == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4                          # fixed: v5 does not exist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_S3_ACCESS }}
          aws-region: us-east-1

      - name: Setup Nix
        uses: cachix/install-nix-action@v31

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            .terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/*.tf') }}-drift
          restore-keys: |
            terraform-${{ runner.os }}-drift

      - name: Terraform Init
        run: |
          nix-shell shell.nix --run '
            cd infrastructure &&
            terraform init -reconfigure -backend-config=envs/aws.backend
          '

      # Full plan — not refresh-only — so deleted/modified resources are actually recreated
      - name: Terraform Plan
        run: |
          nix-shell shell.nix --run '
            cd infrastructure &&
            terraform plan -out=tfplan | tee drift-remediation-plan.txt
          '

      - name: Terraform Plan JSON
        run: |
          nix-shell shell.nix --run '
            cd infrastructure &&
            terraform show -json tfplan > tfplan.json
          '

      - name: Upload Remediation Plan
        uses: actions/upload-artifact@v4
        with:
          name: drift-remediation-plan-${{ github.run_id }}
          path: |
            infrastructure/tfplan
            infrastructure/tfplan.json
            infrastructure/drift-remediation-plan.txt

      - name: Manual Approval
        uses: trstringer/manual-approval@v1.12.0
        with:
          approvers: 'shilucloud'
          minimum-approvals: 1
          issue-title: "Manual Approval Required: Terraform Drift Remediation"
          secret: ${{ secrets.PAT_TOKEN }}

      # Full apply — recreates deleted resources, restores modified ones
      - name: Terraform Apply
        run: |
          nix-shell shell.nix --run '
            cd infrastructure &&
            terraform apply "tfplan" --auto-approve
          '

      - name: Close Drift Issue on Successful Remediation
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'drift',
              state: 'open'
            });
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Drift has been remediated by workflow run #${{ github.run_id }}.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
